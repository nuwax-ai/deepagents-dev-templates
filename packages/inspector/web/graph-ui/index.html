<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepAgents Inspector</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client",
          "reactflow": "https://esm.sh/reactflow@11"
        }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <main class="fallback-shell">
        <h1>DeepAgents Inspector</h1>
        <pre id="fallback-json">Loading spec...</pre>
      </main>
    </div>
    <script>
      fetch("/api/spec")
        .then((response) => response.json())
        .then((spec) => {
          window.__INSPECTOR_SPEC__ = spec;
          const fallback = document.getElementById("fallback-json");
          if (fallback) fallback.textContent = JSON.stringify(spec, null, 2);
        })
        .catch((error) => {
          const fallback = document.getElementById("fallback-json");
          if (fallback) fallback.textContent = String(error);
        });
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
