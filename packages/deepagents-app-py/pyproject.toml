[project]
name = "deepagents-app-py"
version = "0.2.11"
description = "DeepAgents Python application agent template — ACP server, tools, skills, config, distribution. Built on LangGraph + deepagents."
readme = "README.md"
keywords = [
    "deepagents",
    "acp",
    "ai-agent",
    "pydantic-ai",
    "nuwaclaw",
    "template",
    "agent-client-protocol",
    "llm",
    "tool-calling",
    "subagents",
    "mcp",
]
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Nuwax AI", email = "dev@nuwax.ai" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "typer>=0.12",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
    "click>=8.1",
    "anyio>=4.0",
    # ── Agent stack: LangGraph + deepagents (replaces pydantic-ai) ──
    "deepagents>=0.6.8",
    "deepagents-acp>=0.0.8",
    "langgraph>=1.2.4",
    "langchain>=1.3.7",
    "langchain-anthropic>=1.4.5",
    "langchain-openai>=1.3.0",
    "langchain-google-genai>=4.2.5",
    # ── MCP: native tool registration via langchain-mcp-adapters ──
    "langchain-mcp-adapters>=0.1.0",
    "mcp>=1.0",
]

[project.optional-dependencies]
yaml = ["pyyaml>=6.0"]
cli = [
    "textual>=3.0.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "prompt-toolkit>=3.0.0",
    "python-dotenv>=1.0.0",
]
acp = ["agent-client-protocol>=0.8.0"]
all = [
    "deepagents-app-py[yaml,cli,acp]",
]

[project.urls]
Homepage = "https://github.com/nuwax-ai/deepagents-dev-templates"
Documentation = "https://github.com/nuwax-ai/deepagents-dev-templates"
Repository = "https://github.com/nuwax-ai/deepagents-dev-templates"
Issues = "https://github.com/nuwax-ai/deepagents-dev-templates/issues"

[project.scripts]
deepagents-app-py = "deepagents_app_py.main:main"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/deepagents_app_py"]

[tool.hatch.build.targets.wheel.shared-data]
"config" = "deepagents_app_py/config"
"prompts" = "deepagents_app_py/prompts"
"skills" = "deepagents_app_py/skills"

[tool.hatch.build.targets.sdist]
include = [
    "src/deepagents_app_py",
    "config",
    "prompts",
    "skills",
    "scripts",
    "tests",
    ".nuwax-agent",
    "agent-package.json",
    "agent-package.release.json",
    "template.manifest.json",
    "README.md",
    "CLAUDE.md",
    "QUICKSTART.md",
    "LICENSE",
]

[dependency-groups]
dev = [
    "deepagents-app-py[all]",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "coverage>=7.0",
    "build>=1.0",
    "twine>=5.0",
    "pre-commit>=4.0",
]
lint = [
    "ruff>=0.8",
    "pyright>=1.1",
    "mypy>=1.0",
    "types-PyYAML",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings>=0.26",
    "mkdocstrings-python>=1.12",
]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["dist", "build", ".venv", "site"]

[tool.ruff.lint]
select = [
    "E", "F", "I", "UP", "B", "SIM", "Q", "RUF", "C90",
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
"src/deepagents_app_py/prompts/**" = ["E501"]
"**/prompts/*.md" = ["E501"]
"tests/**" = ["B008", "E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"
addopts = ["-ra", "--strict-markers", "--strict-config"]

[tool.coverage.run]
branch = true
source = ["src/deepagents_app_py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 2
exclude_lines = [
    "pragma: no cover",
    "pragma: lax no cover",
    "if TYPE_CHECKING:",
    "@overload",
    "@abstractmethod",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "except ImportError:",
    "pass",
    "\\.\\.\\.",
]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
include = ["src/deepagents_app_py"]
exclude = ["**/__pycache__", ".venv*", "site", "tests", "examples", "dist", "build"]
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportUnknownArgumentType = false
reportUnknownVariableType = false
reportUnknownParameterType = false
reportUnusedFunction = false
reportPrivateUsage = false
reportOptionalMemberAccess = false
reportCallIssue = false
reportAssignmentType = false

[tool.mypy]
python_version = "3.11"
strict = false
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disable_error_code = ["arg-type", "list-item", "abstract"]
