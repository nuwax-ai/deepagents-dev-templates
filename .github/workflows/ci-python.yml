name: CI (Python)

on:
  push:
    branches: [main]
    paths:
      - "packages/template-python/**"
  pull_request:
    paths:
      - "packages/template-python/**"

permissions:
  contents: read

jobs:
  lint:
    name: ruff · pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: packages/template-python
        run: uv sync --group dev --group lint
      - name: Ruff check
        working-directory: packages/template-python
        run: uv run ruff check .
      - name: Pyright
        working-directory: packages/template-python
        run: uv run pyright

  test:
    name: test · ${{ matrix.os }} · python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install deps
        working-directory: packages/template-python
        run: uv sync --group dev
      - name: Run tests
        working-directory: packages/template-python
        run: uv run pytest

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        working-directory: packages/template-python
        run: uv build
