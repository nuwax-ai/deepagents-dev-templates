name: CI

on:
  push:
    branches: [main]
    paths:
      - "packages/deepagents-app-ts/**"
      - "packages/deepagents-flow-ts/**"
      - "packages/inspector/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "packages/deepagents-app-ts/**"
      - "packages/deepagents-flow-ts/**"
      - "packages/inspector/**"

permissions:
  contents: read

jobs:
  static:
    name: typecheck · lint · build · graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter deepagents-app-ts typecheck
      - run: pnpm --filter deepagents-app-ts lint
      - run: pnpm --filter deepagents-app-ts build
      - run: pnpm --filter deepagents-app-ts graph

  test:
    name: test · ${{ matrix.os }} · node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Unit + ACP smoke + integration. All run without LLM credentials:
      # acp-smoke uses a dummy key and exercises /config (no model call).
      - run: pnpm --filter deepagents-app-ts test
      # Builds the esbuild bundle, then boots dist/bundle.mjs over stdio —
      # cross-platform so a missing createRequire shim or unbundled CJS dep
      # surfaces here, not post-install on a client.
      - run: pnpm --filter deepagents-app-ts test:bundle-smoke

  flow:
    name: flow-ts · typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # flow-ts 复用 app-ts 的 runtime（workspace 依赖），需先构建它
      - run: pnpm --filter deepagents-app-ts build
      - run: pnpm --filter deepagents-flow-ts build
      - run: pnpm --filter deepagents-flow-ts typecheck:examples
      # 全套单测在无凭证下跑（节点走启发式 fallback，不调用真实模型）
      - run: pnpm --filter deepagents-flow-ts test
