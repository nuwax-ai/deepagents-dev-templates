name: release

# Triggers on a push of any v*.*.* tag (stable or pre-release).
# Runs scripts/release.sh which packages the agent (npm tgz, legacy
# *-nuwax.{tar.gz,zip}, AND per-platform {agentName}-{os}-{arch}-{version}.{tar.gz,zip}
# + platforms.json) and publishes to the MinIO/S3 bucket declared in
# .nuwax-agent/distribution.json.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the default branch so we can push version-bump commits back.
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system deps
        run: |
          sudo apt-get update -qq || true
          # zip: required to build the windows-x86_64 per-platform archive.
          sudo apt-get install -y -qq jq curl zip 2>&1 || true

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update 2>&1 | tail -1
          aws --version

      - name: Install node deps
        run: npm ci

      - name: Sync version files to tag
        working-directory: packages/template
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == "$PKG_VERSION" ]]; then
            echo "Versions already in sync: $VERSION"
            exit 0
          fi
          echo "Auto-syncing version files: $PKG_VERSION → $VERSION"
          VERSION="$VERSION" TAG="$TAG" PKG_DIR="$(pwd)" node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const version = process.env.VERSION;
          const tag = process.env.TAG;
          const pkgDir = process.env.PKG_DIR;
          function writeJson(rel, mutate) {
            const file = path.join(pkgDir, rel);
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            mutate(data);
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + "\n");
          }
          writeJson("package.json", (j) => { j.version = version; });
          writeJson("config/app-agent.config.json", (j) => {
            if (j.agent) j.agent.version = version;
          });
          writeJson("agent-package.json", (j) => {
            j.version = version;
            if (j.source) {
              j.source.version = version;
              if (typeof j.source.prefix === "string")
                j.source.prefix = j.source.prefix.replace(/\/versions\/[^/]+$/, `/versions/${version}`);
            }
            for (const alt of j.alternativeSources || []) {
              if ("version" in alt) alt.version = version;
              if (typeof alt.path === "string")
                alt.path = alt.path.replace(/deepagents-dev-templates-[^.]+\.tgz$/, `deepagents-dev-templates-${version}.tgz`);
              if (typeof alt.ref === "string" && alt.ref.startsWith("v")) alt.ref = tag;
            }
          });
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json agent-package.json config/app-agent.config.json
          git commit -m "chore(release): sync version to ${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Publish release
        env:
          NUWAX_S3_ENDPOINT: ${{ secrets.NUWAX_S3_ENDPOINT }}
          NUWAX_S3_REGION: ${{ secrets.NUWAX_S3_REGION }}
          NUWAX_S3_BUCKET: ${{ secrets.NUWAX_S3_BUCKET }}
          NUWAX_S3_ACCESS_KEY_ID: ${{ secrets.NUWAX_S3_ACCESS_KEY_ID }}
          NUWAX_S3_SECRET_ACCESS_KEY: ${{ secrets.NUWAX_S3_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.NUWAX_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NUWAX_S3_SECRET_ACCESS_KEY }}
        run: bash scripts/release.sh "${GITHUB_REF_NAME}"
        working-directory: packages/template
